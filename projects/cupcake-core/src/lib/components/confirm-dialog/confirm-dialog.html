<div class="modal-header">
  <h5 class="modal-title">{{ title }}</h5>
  <button type="button" class="btn-close" (click)="cancel()" aria-label="Close"></button>
</div>
<div class="modal-body">
  <p class="mb-0" style="white-space: pre-line">{{ message }}</p>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-outline-secondary" (click)="cancel()">{{ cancelLabel }}</button>
  <button type="button" class="btn {{ confirmClass }}" (click)="confirm()">{{ confirmLabel }}</button>
</div>
