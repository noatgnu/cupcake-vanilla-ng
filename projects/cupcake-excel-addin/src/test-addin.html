<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Add-in</title>
    <script src="office-js/office.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .status {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            background: #e3f2fd;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        .success {
            background: #e8f5e9;
            color: #2e7d32;
        }
    </style>
</head>
<body>
    <h2>Cupcake Vanilla - Test Page</h2>
    <div id="status">Initializing...</div>
    <div id="log"></div>

    <script>
        function log(message, isError) {
            var logDiv = document.getElementById('log');
            var item = document.createElement('div');
            item.className = 'status' + (isError ? ' error' : '');
            item.textContent = new Date().toISOString().substr(11, 8) + ' - ' + message;
            logDiv.appendChild(item);
        }

        function updateStatus(message, isSuccess) {
            var statusDiv = document.getElementById('status');
            statusDiv.className = 'status' + (isSuccess ? ' success' : '');
            statusDiv.textContent = message;
        }

        log('Page loaded');
        log('Office object exists: ' + (typeof Office !== 'undefined'));

        if (typeof Office !== 'undefined' && Office.onReady) {
            log('Calling Office.onReady...');
            Office.onReady(function(info) {
                log('Office.onReady callback fired');
                log('Host: ' + (info ? info.host : 'unknown'));
                log('Platform: ' + (info ? info.platform : 'unknown'));
                updateStatus('Office ready! Host: ' + (info ? info.host : 'unknown'), true);
            });
        } else {
            log('Office.onReady not available', true);
            updateStatus('Office.js not loaded properly', false);
        }

        window.onerror = function(message, source, lineno, colno, error) {
            log('Error: ' + message + ' at ' + source + ':' + lineno, true);
        };
    </script>
</body>
</html>
