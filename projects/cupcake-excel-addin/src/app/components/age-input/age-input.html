<div class="age-input">
  <div class="form-check form-check-inline mb-2">
    <input
      type="checkbox"
      class="form-check-input"
      id="isRange"
      [checked]="isRange()"
      (change)="toggleRange()">
    <label class="form-check-label small" for="isRange">Age Range</label>
  </div>

  @if (isRange()) {
    <div class="row g-1 mb-1">
      <div class="col-12 small text-muted">Start</div>
      <div class="col-6">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Years"
          min="0"
          max="200"
          [ngModel]="rangeStartYears()"
          (ngModelChange)="rangeStartYears.set($event)">
      </div>
      <div class="col-6">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Months"
          min="0"
          max="11"
          [ngModel]="rangeStartMonths()"
          (ngModelChange)="rangeStartMonths.set($event)">
      </div>
    </div>
    <div class="row g-1">
      <div class="col-12 small text-muted">End</div>
      <div class="col-6">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Years"
          min="0"
          max="200"
          [ngModel]="rangeEndYears()"
          (ngModelChange)="rangeEndYears.set($event)">
      </div>
      <div class="col-6">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Months"
          min="0"
          max="11"
          [ngModel]="rangeEndMonths()"
          (ngModelChange)="rangeEndMonths.set($event)">
      </div>
    </div>
  } @else {
    <div class="row g-1">
      <div class="col-4">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Years"
          min="0"
          max="200"
          [ngModel]="years()"
          (ngModelChange)="years.set($event)">
      </div>
      <div class="col-4">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Months"
          min="0"
          max="11"
          [ngModel]="months()"
          (ngModelChange)="months.set($event)">
      </div>
      <div class="col-4">
        <input
          type="number"
          class="form-control form-control-sm"
          placeholder="Days"
          min="0"
          max="31"
          [ngModel]="days()"
          (ngModelChange)="days.set($event)">
      </div>
    </div>
  }

  <small class="text-muted d-block mt-1">Format: 30Y6M or 25Y-35Y</small>
</div>
