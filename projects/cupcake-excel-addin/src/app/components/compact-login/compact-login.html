<div class="compact-login p-3">
  <div class="login-mode-toggle mb-3">
    <div class="btn-group btn-group-sm w-100" role="group">
      <input
        type="radio"
        class="btn-check"
        name="loginMode"
        id="modeCredentials"
        [checked]="mode() === 'credentials'"
        (change)="setMode('credentials')">
      <label class="btn btn-outline-secondary" for="modeCredentials">
        <i class="bi bi-person me-1"></i>Sign In
      </label>
      <input
        type="radio"
        class="btn-check"
        name="loginMode"
        id="modeLaunchCode"
        [checked]="mode() === 'launchCode'"
        (change)="setMode('launchCode')">
      <label class="btn btn-outline-secondary" for="modeLaunchCode">
        <i class="bi bi-qr-code me-1"></i>Launch Code
      </label>
    </div>
  </div>

  @if (error()) {
    <div class="alert alert-danger alert-sm py-1 px-2 small mb-2">
      {{ error() }}
      <button type="button" class="btn-close btn-close-sm float-end" (click)="clearError()"></button>
    </div>
  }

  <form (ngSubmit)="onSubmit()">
    @if (mode() === 'credentials') {
      <div class="mb-2">
        <input
          type="text"
          class="form-control form-control-sm"
          placeholder="Username"
          [ngModel]="username()"
          (ngModelChange)="username.set($event)"
          name="username"
          [disabled]="loading()" />
      </div>

      <div class="mb-2">
        <input
          type="password"
          class="form-control form-control-sm"
          placeholder="Password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          [disabled]="loading()" />
      </div>

      <div class="form-check mb-2">
        <input
          class="form-check-input"
          type="checkbox"
          id="rememberMe"
          [ngModel]="rememberMe()"
          (ngModelChange)="rememberMe.set($event)"
          name="rememberMe"
          [disabled]="loading()" />
        <label class="form-check-label small" for="rememberMe">
          Remember me
        </label>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-sm w-100"
        [disabled]="loading() || !username() || !password()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-1"></span>
        }
        Sign In
      </button>
    } @else {
      <div class="mb-2">
        <label class="form-label small text-muted">
          Enter the code from the web app:
        </label>
        <textarea
          class="form-control form-control-sm launch-code-input font-monospace"
          placeholder="Paste launch code here..."
          [ngModel]="launchCode()"
          (ngModelChange)="launchCode.set($event)"
          name="launchCode"
          [disabled]="loading()"
          rows="3"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"></textarea>
      </div>

      <button
        type="submit"
        class="btn btn-primary btn-sm w-100"
        [disabled]="loading() || !launchCode()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-1"></span>
        }
        Connect
      </button>

      <div class="mt-2 text-center">
        <small class="text-muted">
          Get a launch code from the web app by clicking "Open in Excel" on a table.
        </small>
      </div>
    }
  </form>
</div>
