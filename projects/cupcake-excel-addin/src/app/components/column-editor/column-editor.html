<div class="column-editor">
  <div class="d-flex align-items-center mb-3">
    <button class="btn btn-sm btn-link p-0 me-2" (click)="onCancel()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h6 class="mb-0">{{ isCreating() ? 'Add Column' : 'Edit Column' }}</h6>
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Column Name</label>
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="e.g., characteristics[organism]"
      [ngModel]="form().name"
      (ngModelChange)="updateForm('name', $event)">
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Type</label>
    <select
      class="form-select form-select-sm"
      [ngModel]="form().type"
      (ngModelChange)="updateForm('type', $event)">
      @for (type of columnTypes; track type) {
        <option [value]="type">{{ type }}</option>
      }
    </select>
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Default Value</label>
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Default value for all samples"
      [ngModel]="form().value"
      (ngModelChange)="updateForm('value', $event)">
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Ontology Type</label>
    <select
      class="form-select form-select-sm"
      [ngModel]="form().ontologyType"
      (ngModelChange)="updateForm('ontologyType', $event)">
      @for (type of ontologyTypes; track type) {
        <option [value]="type">{{ ontologyLabels[type] }}</option>
      }
    </select>
  </div>

  <div class="mb-3">
    <div class="form-check form-check-inline">
      <input
        class="form-check-input"
        type="checkbox"
        id="mandatory"
        [ngModel]="form().mandatory"
        (ngModelChange)="updateForm('mandatory', $event)">
      <label class="form-check-label small" for="mandatory">Required</label>
    </div>
    <div class="form-check form-check-inline">
      <input
        class="form-check-input"
        type="checkbox"
        id="hidden"
        [ngModel]="form().hidden"
        (ngModelChange)="updateForm('hidden', $event)">
      <label class="form-check-label small" for="hidden">Hidden</label>
    </div>
  </div>

  <div class="d-flex gap-2">
    <button
      class="btn btn-primary btn-sm flex-grow-1"
      (click)="save()"
      [disabled]="isSaving()">
      @if (isSaving()) {
        <span class="spinner-border spinner-border-sm me-1"></span>
      }
      {{ isCreating() ? 'Create' : 'Save' }}
    </button>
    <button class="btn btn-outline-secondary btn-sm" (click)="onCancel()">
      Cancel
    </button>
  </div>
</div>
