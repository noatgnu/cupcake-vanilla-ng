<div class="schema-selector">
  <div class="d-flex align-items-center mb-3">
    <button class="btn btn-sm btn-link p-0 me-2" (click)="onCancel()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h6 class="mb-0">Select Schemas</h6>
  </div>

  <div class="search-box mb-2">
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Filter schemas..."
      [ngModel]="searchQuery()"
      (ngModelChange)="searchQuery.set($event)">
  </div>

  @if (isLoading()) {
    <div class="text-center py-3">
      <div class="spinner-border spinner-border-sm text-primary"></div>
      <small class="d-block mt-1 text-muted">Loading schemas...</small>
    </div>
  } @else {
    <div class="schema-list mb-3">
      @for (schema of filteredSchemas(); track schema.id) {
        <div
          class="schema-item p-2 border-bottom"
          [class.selected]="isSelected(schema)"
          role="button"
          (click)="toggleSchema(schema)">
          <div class="d-flex align-items-center">
            <div class="form-check me-2">
              <input
                class="form-check-input"
                type="checkbox"
                [checked]="isSelected(schema)"
                (click)="$event.stopPropagation()">
            </div>
            <div class="schema-info flex-grow-1">
              <div class="fw-medium small">{{ schema.name }}</div>
              @if (schema.category) {
                <small class="text-muted">{{ schema.category }}</small>
              }
            </div>
          </div>
        </div>
      } @empty {
        <div class="text-center text-muted py-3">
          <i class="bi bi-file-earmark-text d-block fs-4"></i>
          <small>No schemas found</small>
        </div>
      }
    </div>

    <div class="d-flex gap-2">
      <button
        class="btn btn-primary btn-sm flex-grow-1"
        (click)="confirm()"
        [disabled]="selectedSchemaIds().length === 0">
        <i class="bi bi-check me-1"></i>
        Select ({{ selectedSchemaIds().length }})
      </button>
      <button class="btn btn-outline-secondary btn-sm" (click)="onCancel()">
        Cancel
      </button>
    </div>
  }
</div>
