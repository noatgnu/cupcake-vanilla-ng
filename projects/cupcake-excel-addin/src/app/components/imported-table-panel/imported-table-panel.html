<div class="panel-header border-bottom px-2 py-1 d-flex align-items-center justify-content-between">
  <span class="small fw-semibold text-muted">
    <i class="bi bi-table me-1"></i>Import Table
  </span>
  <div class="d-flex align-items-center gap-2">
    @if (currentUser()) {
      <small class="text-muted"><i class="bi bi-person-circle me-1"></i>{{ displayName }}</small>
      <button class="btn btn-link btn-sm p-0 text-muted" (click)="logout()">
        <small>Logout</small>
      </button>
    }
  </div>
</div>

@if (showBrowser()) {
  <div class="flex-grow-1 overflow-auto">
    <app-table-browser />
  </div>
} @else {
  <div class="d-flex align-items-center justify-content-center flex-grow-1">
    <div class="spinner-border spinner-border-sm text-primary"></div>
  </div>
}
