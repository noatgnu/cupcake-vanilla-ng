<div class="cleavage-input">
  <div class="mb-2 position-relative">
    <label class="form-label small mb-1">Cleavage Agent Name</label>
    <div class="input-group input-group-sm">
      <input
        type="text"
        class="form-control"
        placeholder="Search cleavage agents..."
        [ngModel]="NT()"
        (ngModelChange)="onNTInput($event)"
        (blur)="hideSuggestions()">
      @if (isSearching()) {
        <span class="input-group-text">
          <span class="spinner-border spinner-border-sm"></span>
        </span>
      }
    </div>
    @if (showSuggestions() && suggestions().length > 0) {
      <div class="suggestions-dropdown position-absolute w-100 bg-white border rounded shadow-sm" style="z-index: 1000; max-height: 150px; overflow-y: auto;">
        @for (s of suggestions(); track s.id) {
          <div
            class="suggestion-item px-2 py-1 small"
            style="cursor: pointer;"
            (mousedown)="selectSuggestion(s)">
            <div>{{ s.displayName }}</div>
            <small class="text-muted">{{ s.id }}</small>
          </div>
        }
      </div>
    }
  </div>

  <div class="row g-1 mb-2">
    <div class="col-6">
      <label class="form-label small mb-1">Accession</label>
      <input
        type="text"
        class="form-control form-control-sm"
        placeholder="MS:1001251"
        [ngModel]="AC()"
        (ngModelChange)="AC.set($event); onFieldChange()">
    </div>
    <div class="col-6">
      <label class="form-label small mb-1">Cleavage Site</label>
      <input
        type="text"
        class="form-control form-control-sm"
        placeholder="(?<=[KR])(?!P)"
        [ngModel]="CS()"
        (ngModelChange)="CS.set($event); onFieldChange()">
    </div>
  </div>

  <small class="text-muted d-block">Format: NT=Trypsin;AC=MS:1001251</small>
</div>
