<div class="export-panel">
  <div class="d-flex align-items-center mb-3">
    <button class="btn btn-sm btn-link p-0 me-2" (click)="goBack()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h6 class="mb-0">Export Table</h6>
  </div>

  <div class="table-info mb-3 p-2 bg-light rounded small">
    <div class="fw-medium">{{ table().name }}</div>
    <small class="text-muted">{{ table().sampleCount }} samples</small>
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Export Format</label>
    <div class="btn-group btn-group-sm w-100" role="group">
      <input type="radio" class="btn-check" id="format-sdrf" name="format"
             [checked]="exportFormat() === 'sdrf'"
             (change)="exportFormat.set('sdrf')">
      <label class="btn btn-outline-secondary" for="format-sdrf">SDRF</label>

      <input type="radio" class="btn-check" id="format-excel" name="format"
             [checked]="exportFormat() === 'excel'"
             (change)="exportFormat.set('excel')">
      <label class="btn btn-outline-secondary" for="format-excel">Excel</label>
    </div>
  </div>

  <div class="mb-3">
    <div class="form-check form-check-sm">
      <input class="form-check-input" type="checkbox" id="includePools"
             [ngModel]="includePools()"
             (ngModelChange)="includePools.set($event)">
      <label class="form-check-label small" for="includePools">Include Sample Pools</label>
    </div>
  </div>

  @if (!downloadUrl()) {
    <button
      class="btn btn-primary btn-sm w-100 mb-2"
      (click)="startExport()"
      [disabled]="isExporting()">
      @if (isExporting()) {
        <span class="spinner-border spinner-border-sm me-1"></span>
      } @else {
        <i class="bi bi-download me-1"></i>
      }
      Export
    </button>
  } @else {
    <button class="btn btn-success btn-sm w-100 mb-2" (click)="download()">
      <i class="bi bi-file-earmark-arrow-down me-1"></i>
      Download File
    </button>
  }

  @if (isExporting() && taskProgress() > 0) {
    <div class="progress mb-2" style="height: 6px;">
      <div class="progress-bar" [style.width.%]="taskProgress()"></div>
    </div>
  }

  @if (statusMessage()) {
    <div class="alert alert-sm py-1 px-2 small"
         [class.alert-info]="isExporting()"
         [class.alert-success]="downloadUrl()"
         [class.alert-danger]="!isExporting() && !downloadUrl() && statusMessage().includes('failed')">
      {{ statusMessage() }}
    </div>
  }
</div>
