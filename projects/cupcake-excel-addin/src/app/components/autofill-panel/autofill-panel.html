<div class="autofill-panel">
  <div class="d-flex align-items-center mb-3">
    <button class="btn btn-sm btn-link p-0 me-2" (click)="goBack()">
      <i class="bi bi-arrow-left"></i>
    </button>
    <h6 class="mb-0">Advanced Autofill</h6>
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Template Samples</label>
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="e.g., 1, 2, 3"
      [ngModel]="templateSamples()"
      (ngModelChange)="templateSamples.set($event)">
    <small class="text-muted">Sample indices to use as template</small>
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Target Sample Count</label>
    <input
      type="number"
      class="form-control form-control-sm"
      min="1"
      [ngModel]="targetSampleCount()"
      (ngModelChange)="targetSampleCount.set($event)">
  </div>

  <div class="mb-2">
    <label class="form-label small mb-1">Fill Strategy</label>
    <select
      class="form-select form-select-sm"
      [ngModel]="fillStrategy()"
      (ngModelChange)="fillStrategy.set($event)">
      @for (strategy of strategies; track strategy) {
        <option [value]="strategy">{{ getStrategyLabel(strategy) }}</option>
      }
    </select>
  </div>

  <hr class="my-2">

  <div class="d-flex justify-content-between align-items-center mb-2">
    <label class="form-label small mb-0">Variations</label>
    <button class="btn btn-sm btn-outline-primary" (click)="addVariation()">
      <i class="bi bi-plus"></i> Add
    </button>
  </div>

  @for (variation of variations(); track $index; let i = $index) {
    <div class="variation-item p-2 mb-2 border rounded">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <select
          class="form-select form-select-sm flex-grow-1 me-2"
          [ngModel]="variation.columnId"
          (ngModelChange)="updateVariation(i, 'columnId', $event)">
          <option [ngValue]="null">Select column...</option>
          @for (col of columns(); track col.id) {
            <option [ngValue]="col.id">{{ col.name }}</option>
          }
        </select>
        <button class="btn btn-sm btn-outline-danger" (click)="removeVariation(i)">
          <i class="bi bi-x"></i>
        </button>
      </div>

      <div class="mb-2">
        <select
          class="form-select form-select-sm"
          [ngModel]="variation.type"
          (ngModelChange)="updateVariation(i, 'type', $event)">
          <option value="range">Range (1-10)</option>
          <option value="list">List (A, B, C)</option>
          <option value="pattern">Pattern (Sample_&#123;n&#125;)</option>
        </select>
      </div>

      @switch (variation.type) {
        @case ('range') {
          <div class="row g-1">
            <div class="col-4">
              <input
                type="number"
                class="form-control form-control-sm"
                placeholder="Start"
                [ngModel]="variation.rangeStart"
                (ngModelChange)="updateVariation(i, 'rangeStart', $event)">
            </div>
            <div class="col-4">
              <input
                type="number"
                class="form-control form-control-sm"
                placeholder="End"
                [ngModel]="variation.rangeEnd"
                (ngModelChange)="updateVariation(i, 'rangeEnd', $event)">
            </div>
            <div class="col-4">
              <input
                type="number"
                class="form-control form-control-sm"
                placeholder="Step"
                [ngModel]="variation.rangeStep"
                (ngModelChange)="updateVariation(i, 'rangeStep', $event)">
            </div>
          </div>
        }
        @case ('list') {
          <input
            type="text"
            class="form-control form-control-sm"
            placeholder="Value1, Value2, Value3"
            [ngModel]="variation.listValues"
            (ngModelChange)="updateVariation(i, 'listValues', $event)">
        }
        @case ('pattern') {
          <div class="row g-1">
            <div class="col-8">
              <input
                type="text"
                class="form-control form-control-sm"
                placeholder="Sample_{n}"
                [ngModel]="variation.pattern"
                (ngModelChange)="updateVariation(i, 'pattern', $event)">
            </div>
            <div class="col-4">
              <input
                type="number"
                class="form-control form-control-sm"
                placeholder="Count"
                [ngModel]="variation.patternCount"
                (ngModelChange)="updateVariation(i, 'patternCount', $event)">
            </div>
          </div>
        }
      }
    </div>
  } @empty {
    <div class="text-center text-muted py-2 small">
      No variations defined. Click "Add" to create one.
    </div>
  }

  <button
    class="btn btn-primary btn-sm w-100 mt-2"
    (click)="apply()"
    [disabled]="isApplying() || variations().length === 0">
    @if (isApplying()) {
      <span class="spinner-border spinner-border-sm me-1"></span>
    } @else {
      <i class="bi bi-magic me-1"></i>
    }
    Apply Autofill
  </button>
</div>
