name: Excel Add-in Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/cupcake-excel-addin/**'
      - 'projects/cupcake-core/**'
      - 'projects/cupcake-vanilla/**'
      - '.github/workflows/excel-addin-test.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'projects/cupcake-excel-addin/**'
      - 'projects/cupcake-core/**'
      - 'projects/cupcake-vanilla/**'
      - '.github/workflows/excel-addin-test.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Build cupcake-core
        run: npx ng build '@noatgnu/cupcake-core'

      - name: Build cupcake-vanilla
        run: npx ng build '@noatgnu/cupcake-vanilla'

      - name: Type check
        run: npx tsc --project projects/cupcake-excel-addin/tsconfig.spec.json --noEmit

      - name: Set CHROME_BIN to Playwright Chromium
        run: |
          PLAYWRIGHT_CHROME=$(node -e "const {chromium} = require('playwright-core'); console.log(chromium.executablePath())")
          echo "#!/bin/bash" > /tmp/chrome-wrapper
          echo "exec \"$PLAYWRIGHT_CHROME\" --no-sandbox \"\$@\"" >> /tmp/chrome-wrapper
          chmod +x /tmp/chrome-wrapper
          echo "CHROME_BIN=/tmp/chrome-wrapper" >> $GITHUB_ENV

      - name: Run unit tests
        run: npx ng test cupcake-excel-addin --browsers=ChromeHeadless --watch=false --no-progress

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: excel-addin-test-results
          path: test-results/
          retention-days: 7

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build cupcake-core
        run: npx ng build '@noatgnu/cupcake-core'

      - name: Build cupcake-vanilla
        run: npx ng build '@noatgnu/cupcake-vanilla'

      - name: Build excel add-in
        run: npx ng build cupcake-excel-addin --configuration production

      - name: Validate manifest
        run: npx office-addin-manifest validate projects/cupcake-excel-addin/manifest.xml
