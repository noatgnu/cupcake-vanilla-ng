name: Deploy Excel Add-in to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build cupcake-core
        run: npx ng build '@noatgnu/cupcake-core'

      - name: Build cupcake-vanilla
        run: npx ng build '@noatgnu/cupcake-vanilla'

      - name: Build Excel add-in for production
        run: npx ng build cupcake-excel-addin --configuration production --base-href /cupcake-vanilla-ng/

      - name: Copy production manifest
        run: cp projects/cupcake-excel-addin/manifest.prod.xml dist/cupcake-excel-addin/browser/manifest.xml

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/cupcake-excel-addin/browser

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
