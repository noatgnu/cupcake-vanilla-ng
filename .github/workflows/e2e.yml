name: E2E Tests

on:
  push:
    branches: [main, master]
    paths:
      - 'projects/**'
      - 'src/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'projects/**'
      - 'src/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out frontend
        uses: actions/checkout@v4

      - name: Check out backend
        uses: actions/checkout@v4
        with:
          repository: noatgnu/cupcake_vanilla
          path: cupcake_vanilla

      - name: Start backend stack
        run: docker compose -f cupcake_vanilla/docker-compose.e2e.yml up -d --wait --wait-timeout 600

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Make build script executable
        run: chmod +x build-all.sh

      - name: Build local libraries
        run: npm run build:libs

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Serve frontend
        run: npx ng serve --port 4200 &

      - name: Wait for frontend
        run: npx wait-on http://localhost:4200 --timeout 120000

      - name: Run E2E tests
        run: npm run e2e:pw
        env:
          API_URL: https://localhost:8099
          VANILLA_NG_URL: http://localhost:4200
          E2E_SKIP_BACKEND_CHECK: "1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-vanilla-ng
          path: e2e/playwright-report/
          retention-days: 14

      - name: Stop backend stack
        if: always()
        continue-on-error: true
        run: |
          if [ -f cupcake_vanilla/docker-compose.e2e.yml ]; then
            docker compose -f cupcake_vanilla/docker-compose.e2e.yml down -v
          fi
