name: Wails Build and Test

on:
  push:
    branches: [ master ]
    paths:
      - 'cupcake-vanilla-wails/**'
      - '.github/workflows/wails-build-test.yml'
  pull_request:
    branches: [ master ]
    paths:
      - 'cupcake-vanilla-wails/**'
      - '.github/workflows/wails-build-test.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install root dependencies
        run: npm ci

      - name: Build cupcake-core library
        run: npx ng build @noatgnu/cupcake-core

      - name: Build with build.sh
        working-directory: ./cupcake-vanilla-wails
        run: |
          chmod +x build.sh
          ./build.sh release linux amd64

      - name: Run Go tests with coverage
        working-directory: ./cupcake-vanilla-wails
        run: go test -v -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./cupcake-vanilla-wails/coverage.out
          flags: wails
        continue-on-error: true

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install root dependencies
        run: npm ci

      - name: Build cupcake-core library
        run: npx ng build @noatgnu/cupcake-core

      - name: Build release
        working-directory: ./cupcake-vanilla-wails
        run: |
          chmod +x build.sh
          ./build.sh release linux amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-linux-amd64
          path: cupcake-vanilla-wails/build/bin/linux-amd64/
          retention-days: 7

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install root dependencies
        run: npm ci

      - name: Build cupcake-core library
        run: npx ng build @noatgnu/cupcake-core

      - name: Generate bindings
        working-directory: ./cupcake-vanilla-wails
        run: wails3 generate bindings

      - name: Install frontend dependencies
        working-directory: ./cupcake-vanilla-wails/frontend
        run: npm install

      - name: Build frontend
        working-directory: ./cupcake-vanilla-wails/frontend
        run: npm run build

      - name: Build main app
        run: npx ng build --configuration=wails || npx ng build --configuration=production
        continue-on-error: true

      - name: Copy main app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path cupcake-vanilla-wails/mainapp/dist/browser
          if (Test-Path dist/cupcake-vanilla-ng/browser) {
            Copy-Item -Recurse -Force dist/cupcake-vanilla-ng/browser/* cupcake-vanilla-wails/mainapp/dist/browser/
          } elseif (Test-Path dist/browser) {
            Copy-Item -Recurse -Force dist/browser/* cupcake-vanilla-wails/mainapp/dist/browser/
          } else {
            "<html><body>Placeholder</body></html>" | Out-File -FilePath cupcake-vanilla-wails/mainapp/dist/browser/index.html
          }

      - name: Build Windows binary
        working-directory: ./cupcake-vanilla-wails
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/bin/windows-amd64
          go build -ldflags="-s -w -H windowsgui" -o build/bin/windows-amd64/cupcake-vanilla.exe .

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-windows-amd64
          path: cupcake-vanilla-wails/build/bin/windows-amd64/
          retention-days: 7

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root dependencies
        run: npm ci

      - name: Build cupcake-core library
        run: npx ng build @noatgnu/cupcake-core

      - name: Build release
        working-directory: ./cupcake-vanilla-wails
        run: |
          chmod +x build.sh
          ./build.sh release darwin arm64

      - name: Build amd64 variant
        working-directory: ./cupcake-vanilla-wails
        run: ./build.sh release darwin amd64
        continue-on-error: true

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-macos-arm64
          path: cupcake-vanilla-wails/build/bin/darwin-arm64/
          retention-days: 7

      - name: Upload macOS amd64 artifact
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: cupcake-vanilla-macos-amd64
          path: cupcake-vanilla-wails/build/bin/darwin-amd64/
          retention-days: 7
          if-no-files-found: ignore
