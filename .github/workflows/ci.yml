name: CI

on:
  push:
    branches: [main, master]
    paths:
      - 'cupcake-vanilla-wails/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cupcake-vanilla-wails/**'
      - '.github/workflows/ci.yml'

defaults:
  run:
    working-directory: cupcake-vanilla-wails

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cupcake-vanilla-wails/frontend/package-lock.json

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate bindings
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 generate bindings -ts -d frontend/bindings

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build main app
        run: |
          cd ..
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build --configuration=wails || npx ng build --configuration=production
          mkdir -p cupcake-vanilla-wails/mainapp/dist/browser
          cp -r dist/cupcake-vanilla-ng/browser/* cupcake-vanilla-wails/mainapp/dist/browser/

      - name: Run Go tests
        run: go test -v ./... -count=1

      - name: Install Playwright
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          cd frontend
          npm run test:e2e

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cupcake-vanilla-wails/frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate bindings
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 generate bindings -ts -d frontend/bindings

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build main app
        shell: bash
        run: |
          cd ..
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build --configuration=wails || npx ng build --configuration=production
          mkdir -p cupcake-vanilla-wails/mainapp/dist/browser
          cp -r dist/cupcake-vanilla-ng/browser/* cupcake-vanilla-wails/mainapp/dist/browser/

      - name: Build application (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          GOOS=${{ matrix.platform }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o build/bin/${{ matrix.platform }}-${{ matrix.arch }}/cupcake-vanilla

      - name: Build application (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          GOOS=${{ matrix.platform }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w -H windowsgui" \
            -o build/bin/${{ matrix.platform }}-${{ matrix.arch }}/cupcake-vanilla.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cupcake-vanilla-${{ matrix.platform }}-${{ matrix.arch }}
          path: cupcake-vanilla-wails/build/bin/${{ matrix.platform }}-${{ matrix.arch }}/
          retention-days: 7
