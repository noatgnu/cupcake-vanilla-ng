name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    working-directory: cupcake-vanilla-wails

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
            artifact_name: cupcake-vanilla
            asset_name: cupcake-vanilla-linux-amd64
          - os: windows-latest
            platform: windows
            arch: amd64
            artifact_name: cupcake-vanilla.exe
            asset_name: cupcake-vanilla-windows-amd64.exe
          - os: macos-13
            platform: darwin
            arch: amd64
            artifact_name: cupcake-vanilla
            asset_name: cupcake-vanilla-darwin-amd64
          - os: macos-latest
            platform: darwin
            arch: arm64
            artifact_name: cupcake-vanilla
            asset_name: cupcake-vanilla-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cupcake-vanilla-wails/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cupcake-vanilla-wails/frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Generate bindings
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails3 generate bindings -ts -d frontend/bindings

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build main app
        shell: bash
        run: |
          cd ..
          npm ci
          npx ng build @noatgnu/cupcake-core
          npx ng build --configuration=wails || npx ng build --configuration=production
          mkdir -p cupcake-vanilla-wails/mainapp/dist/browser
          cp -r dist/cupcake-vanilla-ng/browser/* cupcake-vanilla-wails/mainapp/dist/browser/

      - name: Run Go tests
        run: go test -v ./... -count=1

      - name: Build release (Linux/macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          mkdir -p build/bin/${{ matrix.platform }}-${{ matrix.arch }}
          GOOS=${{ matrix.platform }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w" \
            -o build/bin/${{ matrix.platform }}-${{ matrix.arch }}/${{ matrix.artifact_name }}

      - name: Build release (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          mkdir -p build/bin/${{ matrix.platform }}-${{ matrix.arch }}
          GOOS=${{ matrix.platform }} GOARCH=${{ matrix.arch }} CGO_ENABLED=1 go build \
            -ldflags="-s -w -H windowsgui" \
            -o build/bin/${{ matrix.platform }}-${{ matrix.arch }}/${{ matrix.artifact_name }}

      - name: Create archive (Linux/macOS)
        if: matrix.platform != 'windows'
        run: |
          cd build/bin/${{ matrix.platform }}-${{ matrix.arch }}
          tar -czvf ../../../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          cd build/bin/${{ matrix.platform }}-${{ matrix.arch }}
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ../../../${{ matrix.asset_name }}.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: |
            cupcake-vanilla-wails/${{ matrix.asset_name }}.tar.gz
            cupcake-vanilla-wails/${{ matrix.asset_name }}.zip
          retention-days: 1

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          cd ..
          find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Cupcake Vanilla ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
